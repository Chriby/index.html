<!DOCTYPE html>
<html>
<head>
    <title>La mia prima App</title>
</head>
<body>
    <h1>Benvenuti sulla mia App! 🚀</h1>
    
    <p>Questa è la mia descrizione e il mio profilo.</p>
    
    <img src="foto.jpg" alt="La mia foto" width="300">

    <hr> <h3>Interagisci con l'app:</h3>
    <p>Hai cliccato <span id="numero">0</span> volte.</p>
    <button onclick="aggiungi()">Clicca qui!</button>

    <script>
        let conteggio = 0;
        function aggiungi() {
            conteggio = conteggio + 1;
            document.getElementById("numero").innerText = conteggio;
        }
    </script>
</body>
</html>
